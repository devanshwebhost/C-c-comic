<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Comic Universe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ⏳ Preloader Overlay (Added) -->
    <div id="loading-overlay" class="hidden">
        <div class="loader-content">
            <i class="fas fa-book-open loader-icon"></i>
            <h2>Downloading Magic... ✨</h2>
            <p id="loading-progress">0%</p>
        </div>
    </div>

    <!-- HOME: Library View -->
    <div id="library-view">
        <header>
            <h1>Comic Universe</h1>
        </header>
        <div id="comic-grid" class="grid">
            <!-- Comics will be injected here by JS -->
        </div>
    </div>

    <!-- READER: Comic View -->
    <div id="reader-view" class="hidden">
        <div class="reader-toolbar">
            <button id="close-btn" title="Close Book"><i class="fas fa-arrow-left"></i></button>
            
            <!-- 📖 Page Counter (New UX) -->
            <div class="page-counter" id="page-counter">Page 1 / ?</div>

            <div class="reader-controls">
                <button id="lang-toggle" title="Switch Language">EN</button>
                <button id="zoom-out"><i class="fas fa-search-minus"></i></button>
                <button id="zoom-in"><i class="fas fa-search-plus"></i></button>
                <button id="bgm-toggle" title="Toggle Sound"><i class="fas fa-volume-up"></i></button>
            </div>
        </div>

        <!-- Book Container is now the clickable area -->
        <div class="book-container" id="book-container">
            <div class="page-wrapper">
                <div id="page-element" class="page">
                    <img id="comic-image" src="" alt="Comic Page">
                </div>
            </div>
        </div>
        
        <!-- Tutorial Overlay -->
        <div id="tutorial-overlay" class="hidden">
            <div class="tut-content">
                <div class="tut-side tut-left">
                    <i class="fas fa-hand-point-left"></i>
                    <p>Tap Left for Previous</p>
                </div>
                <div class="tut-side tut-right">
                    <i class="fas fa-hand-point-right"></i>
                    <p>Tap Right for Next</p>
                </div>
            </div>
            <p class="tut-dismiss">Tap anywhere to start reading</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

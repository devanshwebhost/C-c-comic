<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Universe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- HOME: Library View -->
    <div id="library-view">
        <header>
            <h1>Comic Universe</h1>
        </header>
        <div id="comic-grid" class="grid">
            <!-- Comics will be injected here by JS -->
        </div>
    </div>

    <!-- READER: Comic View -->
    <div id="reader-view" class="hidden">
        <div class="reader-toolbar">
            <button id="close-btn" title="Close Book"><i class="fas fa-arrow-left"></i> Back</button>
            <div class="reader-controls">
                <button id="zoom-out"><i class="fas fa-search-minus"></i></button>
                <button id="zoom-in"><i class="fas fa-search-plus"></i></button>
                <button id="bgm-toggle" title="Toggle Sound"><i class="fas fa-volume-up"></i></button>
            </div>
        </div>

        <div class="book-container">
            <button id="prev-page" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
            
            <div class="page-wrapper">
                <div id="page-element" class="page">
                    <img id="comic-image" src="" alt="Comic Page">
                </div>
            </div>

            <button id="next-page" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
